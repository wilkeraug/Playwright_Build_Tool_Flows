name: Element Extraction

on:
  push:
    branches: [main]
    paths:
      - 'config/targets.ts'
  workflow_dispatch:
  schedule:
    # Every Monday at 06:00 UTC — detects UI drift automatically
    - cron: '0 6 * * 1'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run extraction
        run: npm run extract
        env:
          CI: true
          # Add secrets here for authenticated pages:
          # AUTH_EMAIL: ${{ secrets.AUTH_EMAIL }}
          # AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}

      - name: Upload generated documentation
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: documentation-${{ github.run_number }}
          path: Documentation/
          retention-days: 90
